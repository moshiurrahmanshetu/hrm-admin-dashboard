<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuraHR - Session Locked</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom Theme & Style CSS -->
    <link href="assets/css/theme.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
    <link href="assets/css/responsive.css" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 50% 50%, rgba(var(--primary-accent-rgb), 0.08) 0%, transparent 80%),
                    var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-sans), system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }
      .lock-container {
        width: 100%;
        max-width: 420px;
        padding: 2rem 1.5rem;
      }
      .lock-card {
        border-radius: var(--radius-xl);
        background: var(--card-bg-solid);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow-xl);
        padding: 3rem 2.5rem 2.5rem;
        position: relative;
        text-align: center;
      }
      .lock-avatar-wrapper {
        position: relative;
        width: 110px;
        height: 110px;
        margin: -80px auto 1.5rem;
      }
      .lock-avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid var(--card-bg-solid);
        box-shadow: var(--shadow-xl);
      }
      .lock-status-dot {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background-color: var(--warning);
        border: 3px solid var(--card-bg-solid);
        box-shadow: var(--shadow-md);
      }
      .floating-theme-toggle {
        position: fixed;
        top: 2rem;
        right: 2rem;
        z-index: 1000;
      }
      .form-floating-custom {
        position: relative;
      }
      .password-toggle-btn {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 0.25rem;
        z-index: 5;
        transition: color 0.2s;
      }
      .password-toggle-btn:hover {
        color: var(--text-primary);
      }
      .show-hide-password-input {
        padding-right: 2.75rem !important;
      }
    </style>
  </head>
  <body>
    <!-- Floating Theme Switcher -->
    <div class="floating-theme-toggle">
      <button class="header-action-btn theme-toggle-trigger" data-bs-toggle="tooltip" data-bs-placement="bottom" title="Switch Theme">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>

    <!-- Main Container -->
    <div class="lock-container" data-aos="zoom-in" data-aos-duration="800">
      <!-- AuraHR Branding logo -->
      <div class="text-center mb-5">
        <div class="brand-icon-wrapper mx-auto mb-2" style="width: 44px; height: 44px;">
          <i class="fa-solid fa-users-gear fs-5"></i>
        </div>
        <h2 class="brand-text fs-4" style="background: linear-gradient(135deg, var(--text-primary), var(--primary-accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;">AuraHR</h2>
      </div>

      <!-- Lock Card -->
      <div class="lock-card">
        <!-- User Avatar -->
        <div class="lock-avatar-wrapper">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=256&auto=format&fit=crop" alt="Sarah Jenkins" class="lock-avatar">
          <span class="lock-status-dot" data-bs-toggle="tooltip" title="Session Locked (Away)"></span>
        </div>

        <h3 class="h5 fw-800 text-primary mb-1">Sarah Jenkins</h3>
        <p class="text-secondary small mb-4">HR Director &bull; Work Session Paused</p>

        <!-- Unlock Password Form -->
        <form action="index.html" method="GET" class="needs-validation" novalidate id="unlockForm">
          <div class="mb-4 text-start">
            <label for="passwordInput" class="form-label text-secondary small fw-600 mb-1">Password</label>
            <div class="form-floating-custom input-group search-input-group border rounded" style="background: var(--bg-primary);">
              <span class="search-icon px-3 text-muted" style="position: static; transform: none; display: flex; align-items: center; pointer-events: none;"><i class="fa-solid fa-lock"></i></span>
              <input type="password" class="form-control border-0 bg-transparent py-2.5 text-primary show-hide-password-input" id="passwordInput" placeholder="••••••••••••" required value="admin123" style="box-shadow: none; font-size: 0.9rem;">
              <button type="button" class="password-toggle-btn" id="passwordToggleBtn" aria-label="Toggle Password Visibility">
                <i class="fa-solid fa-eye" id="passwordToggleIcon"></i>
              </button>
              <div class="invalid-feedback px-3 pb-2 small">Password is required.</div>
            </div>
          </div>

          <!-- Unlock button -->
          <button type="submit" class="gradient-btn w-full justify-content-center py-2.5 mb-3" style="width: 100%;">
            <span>Unlock Workspace</span>
            <i class="fa-solid fa-lock-open ms-1"></i>
          </button>
        </form>

        <div class="text-center mt-3 pt-3 border-top" style="border-color: var(--border-color) !important;">
          <span class="text-secondary small">Not Sarah Jenkins? <a href="login.html" class="text-decoration-none text-primary fw-600">Switch Account</a></span>
        </div>
      </div>
    </div>

    <!-- Script imports -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="assets/js/theme.js"></script>
    <script src="assets/js/animation.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Form validation
        const unlockForm = document.getElementById('unlockForm');
        if (unlockForm) {
          unlockForm.addEventListener('submit', (e) => {
            if (!unlockForm.checkValidity()) {
              e.preventDefault();
              e.stopPropagation();
            }
            unlockForm.classList.add('was-validated');
          });
        }

        // Show/Hide Password Toggle
        const passwordInput = document.getElementById('passwordInput');
        const toggleBtn = document.getElementById('passwordToggleBtn');
        const toggleIcon = document.getElementById('passwordToggleIcon');

        if (toggleBtn && passwordInput && toggleIcon) {
          toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.getAttribute('type') === 'password';
            passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
            toggleIcon.className = isPassword ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
          });
        }
      });
    </script>
  </body>
</html>
